<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Work Progress Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f4f6f9; }
    h1 { color: #2c3e50; }
    .task { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .task-name { font-size: 15px; font-weight: bold; flex: 1; }
    .task select { padding: 5px 10px; border-radius: 5px; border: 1px solid #ccc; }
    .add-box { display: flex; gap: 10px; margin: 20px 0; }
    .add-box input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; }
    .add-box button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
    .badge { font-size: 12px; padding: 3px 8px; border-radius: 10px; }
    .Pending { background: #ffeaa7; color: #d35400; }
    .InProgress { background: #dfe6e9; color: #2980b9; }
    .Done { background: #d5f5e3; color: #27ae60; }
    #status-bar { font-size: 13px; color: #888; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>📋 Work Progress Tracker</h1>
  <div id="status-bar">⏳ Connecting...</div>
  <div class="add-box">
    <input type="text" id="taskInput" placeholder="Enter task name..." />
    <button onclick="addTask()">+ Add Task</button>
  </div>
  <div id="taskList"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc }
      from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCU2C3UkwQtZJNn4WP6DCjic7Ul6gdSBdM",
      authDomain: "work-progress-app-b1939.firebaseapp.com",
      projectId: "work-progress-app-b1939",
      storageBucket: "work-progress-app-b1939.firebasestorage.app",
      messagingSenderId: "1035302891236",
      appId: "1:1035302891236:web:8e4c6e5f0462a037a9c6f1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tasksCol = collection(db, "tasks");

    onSnapshot(tasksCol, (snapshot) => {
      document.getElementById("status-bar").innerText = "🟢 Live — " + snapshot.size + " task(s)";
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";
      snapshot.forEach((docSnap) => {
        const task = docSnap.data();
        const id = docSnap.id;
        const statusClass = task.status.replace(" ", "");
        taskList.innerHTML += `
          <div class="task">
            <span class="task-name">📌 ${task.name}</span>
            <select onchange="updateStatus('${id}', this.value)">
              <option ${task.status==='Pending'?'selected':''}>Pending</option>
              <option ${task.status==='In Progress'?'selected':''}>In Progress</option>
              <option ${task.status==='Done'?'selected':''}>Done</option>
            </select>
            <span class="badge ${statusClass}">${task.status}</span>
            <button class="delete-btn" onclick="deleteTask('${id}')">🗑</button>
          </div>`;
      });
    });

    window.addTask = async () => {
      const input = document.getElementById("taskInput");
      if (!input.value.trim()) return;
      await addDoc(tasksCol, { name: input.value.trim(), status: "Pending", createdAt: new Date().toISOString() });
      input.value = "";
    };

    window.updateStatus = async (id, status) => {
      await updateDoc(doc(db, "tasks", id), { status });
    };

    window.deleteTask = async (id) => {
      if (confirm("Delete this task?")) await deleteDoc(doc(db, "tasks", id));
    };
  </script>
</body>
</html>
